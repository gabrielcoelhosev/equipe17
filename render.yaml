services:
  - type: web
    name: equipe17
    runtime: node
    plan: starter
    buildCommand: npm run build:all
    preDeployCommand: npm run db:deploy
    startCommand: npm start
    healthCheckPath: /check
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: equipe17-db
          property: connectionString

databases:
  - name: equipe17-db
    plan: basic-256mb
