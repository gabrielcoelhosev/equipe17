services:
  db:
    image: postgres:16
    restart: always
    container_name: equipe_17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: equipe_17
      POSTGRES_DB: equipe17
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    container_name: equipe17
    ports:
      - "8080:8080"

volumes:
  postgres_data: